name: Daily Options Screener

# Runs the (yfinance-only) screener in the cloud and pushes the report to Telegram.
# No PC required. The monitor + stop orders stay on your PC (they need IB Gateway).
#
# Setup:
#   1. Push this repo to GitHub.
#   2. Repo Settings -> Secrets and variables -> Actions -> add:
#        TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#   3. (Optional, for IBKR-grade IV Rank in the cloud) commit data/iv_history.csv
#      from your PC's weekly update_iv_history.py run.

on:
  schedule:
    # cron is UTC and does NOT shift for daylight saving. Times below are for EDT
    # (summer, UTC-4). In EST (winter, UTC-5) add 1 hour to each UTC time.
    # NOTE: GitHub cron is best-effort and tends to DROP on-the-hour (:00) jobs under
    # load, so these use off-hour minutes for better reliability.
    # ~30 min after open (~10:07 ET) — both lines cover summer & winter:
    - cron: '7 14 * * 1-5'    # 10:07 ET in summer (EDT, UTC-4)
    - cron: '7 15 * * 1-5'    # 10:07 ET in winter (EST, UTC-5)
    # ~30 min before close (~15:33 ET) — summer (add '33 20 * * 1-5' for winter):
    - cron: '33 19 * * 1-5'   # 15:33 ET in summer (EDT)
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run screener
        run: python screener.py
      - name: Send report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_report.py
